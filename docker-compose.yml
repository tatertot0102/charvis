services:
  db:
    image: postgres:16
    container_name: jarvis-db
    environment:
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: jarvis
      POSTGRES_DB: jarvis
    volumes:
      - jarvis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis -d jarvis"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Not published to the host — only the brain (on the compose network) reaches Postgres.

  brain:
    build: ./brain
    container_name: jarvis-brain
    env_file: .env
    ports:
      # Published on the host's interfaces (incl. Tailscale). The router has no port-forward,
      # so this is only reachable on LAN/Tailscale. See EXECUTION_PLAN §9 (no public ports).
      - "${BIND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      # Lets the container reach services running natively on the Mac host (e.g. future Ollama).
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  jarvis_pgdata:
